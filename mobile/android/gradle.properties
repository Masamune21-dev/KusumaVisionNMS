# Dikonstrain untuk server 8GB (menghindari swap-thrash): heap kecil, tanpa daemon,
# worker & paralelisme dibatasi. Aman berbagi RAM dengan php-fpm/postgres/redis prod.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=768m
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=2
org.gradle.caching=true
kotlin.incremental=false
android.useAndroidX=true
android.newDsl=false
android.builtInKotlin=false
