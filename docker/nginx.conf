# KusumaVision NMS — server block (di-include dari http{} nginx utama).
# Adaptasi langsung dari blok nginx install.sh: root public/, WebSocket telnet,
# fastcgi ke php-fpm (127.0.0.1:9000 di container yang sama), tolak file sensitif.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html/public;

    index index.php;
    charset utf-8;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # WebSocket proxy untuk browser telnet (daemon telnet:proxy @ 127.0.0.1:6002).
    location /telnet-ws {
        proxy_pass http://127.0.0.1:6002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # nginx >=1.30 default fastcgi_params menyetel HTTP_HOST = $host (tanpa port)
        # sebagai hardening keamanan. Container listen di :80 internal tapi di-publish
        # ke host port lain (APP_PORT, default 8080) — tanpa port, Laravel generate
        # URL aset/root ke port yang salah (tak ter-publish) → semua aset gagal load
        # (blank putih). Kembalikan port secara eksplisit.
        fastcgi_param HTTP_HOST $http_host;
    }

    # Tolak file sensitif.
    location ~ /\.(?!well-known).* { deny all; }
    location ~* \.(env|bak|sql|log|ya?ml)$ { deny all; }
}
