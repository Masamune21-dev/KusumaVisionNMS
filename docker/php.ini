; KusumaVision NMS — override PHP produksi (di-load setelah default).
; Jangan bocorkan versi PHP di header X-Powered-By (sidik jari server).
expose_php = Off
memory_limit = 512M
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 120

; OPcache produksi.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
